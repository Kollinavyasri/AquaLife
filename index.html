<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaLife</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="loading">

<!-- 🌊 RIPPLE LOADING SCREEN -->

<div id="loadingScreen">
  <div class="bowl">
    <div class="water"></div>
  </div>
  <p>Analyzing River Data...</p>
</div>

<div class="center">

  <div class="glass">

<div class="logo-box">
  <img src="logo.png" class="logo">

  <h1 class="title">
    <span class="aqua-part">Aqua</span>
    <span class="life-part">Life</span>
  </h1>
</div>

<p class="subtitle">Smart Aquatic Ecosystem Monitoring</p>

<div class="form-group">

  <select id="river">

    <option disabled selected>Select River</option>

    <option>Indus</option>
    <option>Ganga</option>
    <option>Brahmaputra</option>
    <option>Yamuna</option>
    <option>Sutlej</option>
    <option>Beas</option>
    <option>Chenab</option>
    <option>Jhelum</option>

    <option>Godavari</option>
    <option>Krishna</option>
    <option>Narmada</option>
    <option>Mahanadi</option>
    <option>Kaveri</option>
    <option>Tapti</option>
    <option>Sabarmati</option>

  </select>

  <button onclick="goToDashboard()">Analyze</button>

</div>

  </div>

</div>

<script>

function goToDashboard(){

  const river = document.getElementById("river").value;

  if(!river || river === "Select River"){
    alert("⚠️ Please select a river first!");
    return;
  }

  localStorage.setItem("river", river);

  /* show ripple loader */
  document.getElementById("loadingScreen").style.display = "flex";

  /* open dashboard after 4 seconds */
  setTimeout(function(){
    window.location.href = "dashboard.html";
  },4000);

}

</script>
<script>

window.addEventListener("load",function(){
  document.body.classList.remove("loading");
});

</script>

</body>
</html>
